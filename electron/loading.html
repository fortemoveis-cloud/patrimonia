<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>PatrimonIA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4a148c 0%, #1a237e 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: white;
      user-select: none;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: #a5f3fc; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.3px;
    }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
    .version {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-icon">💰</div>
    <div class="logo-text">Patrimon<span>IA</span></div>
  </div>
  <div class="spinner"></div>
  <p class="status">Iniciando<span class="dots"></span></p>
  <p class="version">v1.0.0</p>
</body>
</html>
