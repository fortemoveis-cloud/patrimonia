<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>PatrimonIA — Bem-vindo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #f5f6fa 0%, #e8eaf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 52px 56px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(74, 20, 140, 0.12), 0 4px 20px rgba(0,0,0,0.06);
      text-align: center;
    }
    .patri-avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #4a148c, #7b1fa2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 20px rgba(74,20,140,0.25);
    }
    h1 {
      font-size: 26px; font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    p.lead {
      font-size: 15px; color: #6b7280; line-height: 1.7;
      margin-bottom: 36px;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
      text-align: left;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: #374151;
    }
    .feature-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      background: #f5f3ff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #4a148c, #7b1fa2);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-primary:hover   { opacity: 0.92; }
    .btn-primary:active  { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.85);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 100;
    }
    #overlay.visible { display: flex; }
    .overlay-spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #4a148c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-text { font-size: 14px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="patri-avatar">🤖</div>
    <h1>Olá! Sou a Patri 👋</h1>
    <p class="lead">
      Seu gestor de patrimônio familiar com IA.<br>
      Tudo pronto para começar.
    </p>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📊</div>
        <span>Importe extratos e acompanhe sua carteira</span>
      </div>
      <div class="feature">
        <div class="feature-icon">🏦</div>
        <span>Gerencie investimentos, empréstimos e imóveis</span>
      </div>
      <div class="feature">
        <div class="feature-icon">🤖</div>
        <span>Converse com a Patri para análises com IA</span>
      </div>
    </div>
    <button class="btn-primary" id="btn-start" onclick="start()">
      Começar agora →
    </button>
  </div>

  <div id="overlay">
    <div class="overlay-spinner"></div>
    <p class="overlay-text">Carregando PatrimonIA…</p>
  </div>

  <script>
    async function start() {
      document.getElementById('btn-start').disabled = true;
      document.getElementById('overlay').classList.add('visible');
      try {
        await window.electronAPI.saveSetup({});
      } catch (e) {
        document.getElementById('overlay').classList.remove('visible');
        document.getElementById('btn-start').disabled = false;
        alert('Erro ao iniciar: ' + e.message);
      }
    }
  </script>
</body>
</html>
